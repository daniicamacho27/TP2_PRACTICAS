<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Usuarios | Buscador Dinamico</title>
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>API Usuarios</h1>
            <p class="subtitulo">Sistema de busqueda dinamica</p>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="Buscar usuario por nombre, email o empresa...">
            <div id="searchInfo" class="search-info"></div>
        </div>
        <div id="loadingState" class="loading-state">
            <div class="spinner"></div>
            <p>Cargando usuarios...</p>
        </div>
        <div id="usersContainer" class="users-grid"></div>
        <div class="text-center mt-20">
            <button id="reloadBtn" class="btn-primary">Recargar Usuarios</button>
        </div>
        <div id="stats" class="stats"></div>
    </div>
    <style>
        .search-container {
            margin-bottom: 30px;
        }
        .search-info {
            margin-top: 8px;
            font-size: 0.85rem;
            color: var(--gray);
            padding-left: 5px;
        }
        .search-info.buscar {
            color: var(--primary);
        }
        .search-info.error {
            color: var(--danger);
        }
        .user-card h3 {
            color: var(--dark);
            margin-bottom: 12px;
            font-size: 1.2rem;
            border-bottom: 2px solid var(--primary);
            display: inline-block;
            padding-bottom: 4px;
        }
        .user-info {
            margin-top: 15px;
        }
        .user-info p {
            margin: 8px 0;
            color: var(--gray);
            font-size: 0.9rem;
        }
        .user-info strong {
            color: var(--dark);
            font-weight: 600;
        }
        .user-email {
            color: var(--primary);
            font-weight: 500;
        }
        @media (max-width: 768px) {
            .users-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <script>
        const loadingState = document.getElementById('loadingState');
        const usersContainer = document.getElementById('usersContainer');
        const reloadBtn = document.getElementById('reloadBtn');
        const statsDiv = document.getElementById('stats');
        const searchInput = document.getElementById('searchInput');
        const searchInfo = document.getElementById('searchInfo');
        let todosLosUsuarios = [];
        let timeoutId = null;
        const mostrarError = (mensaje) => {
            usersContainer.innerHTML = `
                <div class="error-state">
                    <strong>Error</strong>
                    <p>${mensaje}</p>
                    <p>Por favor, intenta de nuevo mas tarde.</p>
                </div>
            `;
            statsDiv.innerHTML = '';
        };
        const renderizarUsuarios = (usuarios) => {
            if (!usuarios || usuarios.length === 0) {
                usersContainer.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><p>No se encontraron usuarios</p></div>';
                statsDiv.innerHTML = '';
                return;
            }
            usersContainer.innerHTML = usuarios.map(usuario => `
                <div class="user-card">
                    <h3>${usuario.name}</h3>
                    <div class="user-info">
                        <p><strong>Usuario:</strong> ${usuario.username}</p>
                        <p class="user-email"><strong>Email:</strong> ${usuario.email}</p>
                        <p><strong>Telefono:</strong> ${usuario.phone}</p>
                        <p><strong>Website:</strong> ${usuario.website}</p>
                        <p><strong>Empresa:</strong> ${usuario.company.name}</p>
                        <p><strong>Ciudad:</strong> ${usuario.address.city}</p>
                    </div>
                </div>
            `).join('');
            statsDiv.innerHTML = `Mostrando <span>${usuarios.length}</span> de <span>${todosLosUsuarios.length}</span> usuarios`;
        };
        const filtrarUsuariosLocalmente = (termino) => {
            if (termino.length < 3) {
                searchInfo.innerHTML = termino.length > 0 ? 'Escribe al menos 3 caracteres para buscar' : '';
                searchInfo.className = 'search-info';
                renderizarUsuarios(todosLosUsuarios);
                return;
            }
            searchInfo.innerHTML = 'Buscando...';
            searchInfo.className = 'search-info buscar';
            setTimeout(() => {
                const terminoLower = termino.toLowerCase();
                const resultados = todosLosUsuarios.filter(usuario => {
                    return usuario.name.toLowerCase().includes(terminoLower) ||
                           usuario.email.toLowerCase().includes(terminoLower) ||
                           usuario.company.name.toLowerCase().includes(terminoLower) ||
                           usuario.username.toLowerCase().includes(terminoLower);
                });
                if (resultados.length === 0) {
                    searchInfo.innerHTML = 'No se encontraron resultados';
                    searchInfo.className = 'search-info error';
                } else {
                    searchInfo.innerHTML = `Se encontraron ${resultados.length} resultados`;
                    searchInfo.className = 'search-info';
                }
                renderizarUsuarios(resultados);
            }, 300);
        };
        const fetchUsuarios = async () => {
            try {
                loadingState.classList.remove('hidden');
                usersContainer.innerHTML = '';
                statsDiv.innerHTML = '';
                searchInput.value = '';
                searchInfo.innerHTML = '';
                const response = await fetch('https://jsonplaceholder.typicode.com/users');
                if (!response.ok) {
                    throw new Error(`Error HTTP: ${response.status}`);
                }
                const usuarios = await response.json();
                todosLosUsuarios = usuarios;
                loadingState.classList.add('hidden');
                renderizarUsuarios(usuarios);
            } catch (error) {
                console.error('Error:', error);
                loadingState.classList.add('hidden');
                mostrarError('No se pudieron cargar los usuarios. Verifica tu conexion a internet.');
            }
        };
        searchInput.addEventListener('input', (e) => {
            clearTimeout(timeoutId);
            const termino = e.target.value.trim();
            timeoutId = setTimeout(() => {
                filtrarUsuariosLocalmente(termino);
            }, 300);
        });
        reloadBtn.addEventListener('click', () => {
            fetchUsuarios();
        });
        fetchUsuarios();
    </script>
</body>
</html>
