<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App | Lista de Tareas</title>
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Mi Lista de Tareas</h1>
            <p class="subtitulo">Organiza tu dia de forma productiva</p>
        </div>
        <form id="todoForm" class="todo-form">
            <input type="text" id="todoInput" class="todo-input" placeholder="Escribe una nueva tarea..." autocomplete="off">
            <button type="submit" class="btn-primary">Agregar</button>
        </form>
        <div class="stats">
            <div class="counter">
                Tareas pendientes: <span id="pendingCount">0</span>
            </div>
            <button id="clearCompletedBtn" class="btn-danger">Limpiar completadas</button>
        </div>
        <ul id="todoList" class="todo-list"></ul>
        <div class="footer">
            <p>Haz clic en la tarea para marcarla como completada | Elimina las que ya no necesites</p>
        </div>
    </div>
    <script>
        let tareas = [
            { id: 1, texto: "Estudiar JavaScript", completada: false },
            { id: 2, texto: "Completar los ejercicios", completada: false },
            { id: 3, texto: "Revisar el proyecto final", completada: false }
        ];
        const todoForm = document.getElementById('todoForm');
        const todoInput = document.getElementById('todoInput');
        const todoList = document.getElementById('todoList');
        const pendingCountSpan = document.getElementById('pendingCount');
        const clearCompletedBtn = document.getElementById('clearCompletedBtn');
        const actualizarContador = () => {
            const pendientes = tareas.filter(tarea => !tarea.completada).length;
            pendingCountSpan.textContent = pendientes;
        };
        const eliminarTarea = (id) => {
            tareas = tareas.filter(tarea => tarea.id !== id);
            renderizarTareas();
        };
        const toggleCompletada = (id) => {
            const tarea = tareas.find(tarea => tarea.id === id);
            if (tarea) {
                tarea.completada = !tarea.completada;
                renderizarTareas();
            }
        };
        const agregarTarea = (texto) => {
            if (texto.trim() === '') {
                alert('No puedes agregar una tarea vacia');
                return false;
            }
            const nuevaTarea = {
                id: Date.now(),
                texto: texto.trim(),
                completada: false
            };
            tareas.push(nuevaTarea);
            renderizarTareas();
            return true;
        };
        const renderizarTareas = () => {
            todoList.innerHTML = '';
            if (tareas.length === 0) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'empty-state';
                emptyDiv.innerHTML = `
                    <div class="empty-state-icon">🎉</div>
                    <p>No tienes tareas pendientes</p>
                    <small>Agrega una nueva tarea arriba</small>
                `;
                todoList.appendChild(emptyDiv);
                actualizarContador();
                return;
            }
            tareas.forEach(tarea => {
                const li = document.createElement('li');
                li.className = `todo-item ${tarea.completada ? 'completada' : ''}`;
                li.setAttribute('data-id', tarea.id);
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'todo-checkbox';
                checkbox.checked = tarea.completada;
                checkbox.addEventListener('change', () => toggleCompletada(tarea.id));
                const textSpan = document.createElement('span');
                textSpan.className = 'todo-text';
                textSpan.textContent = tarea.texto;
                textSpan.addEventListener('click', () => toggleCompletada(tarea.id));
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'btn-delete';
                deleteBtn.textContent = 'Eliminar';
                deleteBtn.addEventListener('click', () => eliminarTarea(tarea.id));
                li.appendChild(checkbox);
                li.appendChild(textSpan);
                li.appendChild(deleteBtn);
                todoList.appendChild(li);
            });
            actualizarContador();
        };
        const limpiarCompletadas = () => {
            const tareasPendientes = tareas.filter(tarea => !tarea.completada);
            tareas = tareasPendientes;
            renderizarTareas();
        };
        todoForm.addEventListener('submit', (e) => {
            e.preventDefault();
            if (agregarTarea(todoInput.value)) {
                todoInput.value = '';
                todoInput.focus();
            }
        });
        clearCompletedBtn.addEventListener('click', limpiarCompletadas);
        renderizarTareas();
    </script>
</body>
</html>
